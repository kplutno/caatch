{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "caatch.fullname" . }}-postgres-pvc
  labels:
    {{- include "caatch.labels" . | nindent 4 }}
    app: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.storage.size | quote }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "caatch.fullname" . }}-postgres
  labels:
    {{- include "caatch.labels" . | nindent 4 }}
    app: postgres
spec:
  serviceName: {{ include "caatch.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "caatch.selectorLabels" . | nindent 6 }}
      app: postgres
  template:
    metadata:
      labels:
        {{- include "caatch.selectorLabels" . | nindent 8 }}
        app: postgres
    spec:
      containers:
      - name: postgres
        image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: {{ .Values.postgres.user | quote }}
        - name: POSTGRES_PASSWORD
          value: {{ .Values.postgres.password | quote }}
        - name: POSTGRES_DB
          value: {{ .Values.postgres.database | quote }}
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: {{ include "caatch.fullname" . }}-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "caatch.fullname" . }}-postgres
  labels:
    {{- include "caatch.labels" . | nindent 4 }}
    app: postgres
spec:
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    {{- include "caatch.selectorLabels" . | nindent 4 }}
    app: postgres
{{- end }}
