apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "caatch.fullname" . }}-backend
  labels:
    {{- include "caatch.labels" . | nindent 4 }}
    app: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "caatch.selectorLabels" . | nindent 6 }}
      app: backend
  template:
    metadata:
      labels:
        {{- include "caatch.selectorLabels" . | nindent 8 }}
        app: backend
    spec:
      initContainers:
      - name: wait-for-db
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        command:
        - python
        - -c
        - |
          import time, socket, urllib.parse, os
          db_url = os.getenv("DATABASE_URL")
          if db_url:
              url = db_url.replace("+asyncpg", "")
              parsed = urllib.parse.urlparse(url)
              host = parsed.hostname
              port = parsed.port or 5432
              print(f"Waiting for database at {host}:{port}...")
              for _ in range(60):
                  try:
                      with socket.create_connection((host, port), timeout=2):
                          print("Database is ready!")
                          break
                  except Exception:
                      time.sleep(2)
              else:
                  print("Database connection timed out.")
                  exit(1)
        env:
        - name: DATABASE_URL
          value: "postgresql+asyncpg://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@{{ default (printf "%s-postgres" (include "caatch.fullname" .)) .Values.postgres.host }}:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}"
      containers:
      - name: backend
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.backend.service.port }}
        env:
        - name: ENVIRONMENT
          value: {{ .Values.environment | quote }}
        - name: IMAGE_TAG
          value: {{ .Values.backend.image.tag | quote }}
        - name: DATABASE_URL
          value: "postgresql+asyncpg://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@{{ default (printf "%s-postgres" (include "caatch.fullname" .)) .Values.postgres.host }}:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}"
        livenessProbe:
          httpGet:
            path: /api/health
            port: {{ .Values.backend.service.port }}
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "caatch.fullname" . }}-backend
  labels:
    {{- include "caatch.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
  - port: {{ .Values.backend.service.port }}
    targetPort: {{ .Values.backend.service.port }}
  selector:
    {{- include "caatch.selectorLabels" . | nindent 4 }}
    app: backend
