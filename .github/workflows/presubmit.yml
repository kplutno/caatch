name: PR Verification (Presubmit)

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  backend-lint-test:
    name: Backend Lint, Type Check & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Python Dependencies
        working-directory: ./backend
        run: poetry install

      - name: Run Linter & Formatter (Ruff)
        working-directory: ./backend
        run: |
          poetry run ruff check .
          poetry run ruff format --check .

      - name: Run Type Checker (Mypy)
        working-directory: ./backend
        run: poetry run mypy .

      - name: Run Async Backend Unit Tests (Pytest)
        working-directory: ./backend
        run: poetry run pytest tests/ -v

  frontend-lint-build:
    name: Frontend Lint & Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run Linter (ESLint)
        working-directory: ./frontend
        run: npm run lint

      - name: Run Unit Tests (Vitest)
        working-directory: ./frontend
        run: npm test

      - name: Build Check
        working-directory: ./frontend
        run: npm run build

  integration-tests:
    name: K8s Integration Tests (Kind)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create local Kind Cluster
        uses: helm/kind-action@v1.9.0
        with:
          cluster_name: desktop

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Build & deploy to cluster
        run: |
          chmod +x deploy.sh
          # Pass the commit hash as the tag
          ./deploy.sh dev ${{ github.sha }}

      - name: Wait for deployments to become available
        run: |
          kubectl wait pod -l app=cockroach \
            --for=condition=ready \
            --timeout=120s
          kubectl wait deployment/caatch-backend \
            --for=condition=available \
            --timeout=120s
          kubectl wait deployment/caatch-frontend \
            --for=condition=available \
            --timeout=120s

      - name: Start port-forwarding and wait for backend
        run: |
          nohup kubectl port-forward svc/caatch-backend  8000:8000 --address 0.0.0.0 > /dev/null 2>&1 &
          nohup kubectl port-forward svc/caatch-frontend 3000:3000 --address 0.0.0.0 > /dev/null 2>&1 &

          echo "Polling backend health endpoint..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/health > /dev/null; then
              echo "Backend is ready."
              exit 0
            fi
            echo "Attempt $i/30 — not ready yet, retrying in 2s..."
            sleep 2
          done
          echo "Backend did not become ready in time."
          kubectl describe pods
          kubectl logs -l app=caatch-backend --tail=50
          exit 1

      - name: Set up Python for Integration
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Test Requirements
        run: pip install requests pytest

      - name: Run Integration Tests
        run: pytest tests/integration/ -v

      - name: Dump Kubernetes debug info on failure
        if: failure()
        run: |
          echo "=== Pods Status ==="
          kubectl get pods -o wide || true
          echo "=== Services ==="
          kubectl get svc || true
          echo "=== Recent Events ==="
          kubectl get events --sort-by='.metadata.creationTimestamp' | tail -n 50 || true
          echo "=== Backend Logs ==="
          kubectl logs deployment/caatch-backend --tail=100 || true
          echo "=== Backend Init Container Logs ==="
          kubectl logs deployment/caatch-backend -c wait-for-db --tail=100 || true
          echo "=== Cockroach Logs ==="
          kubectl logs statefulset/caatch-cockroach --tail=100 || true
          echo "=== Pod Descriptions ==="
          kubectl describe pods || true
